<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Night Owl Reader</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body data-theme="graphite">
    <header class="global-bar">
      <div class="left-global">
        <label for="fileInput" class="btn accent">Open file</label>
        <input id="fileInput" type="file" accept=".pdf,.ppt,.pptx" />
        <span id="fileName" class="meta">No file loaded</span>
      </div>
      <div class="right-global">
        <select id="themeSelect" class="input" aria-label="Theme">
          <option value="graphite">Graphite</option>
          <option value="obsidian">Obsidian</option>
          <option value="nordic">Nordic</option>
          <option value="mocha">Mocha</option>
        </select>
      </div>
    </header>

    <section id="welcome" class="welcome">
      <h1>Night Owl PDF & PPT Reader</h1>
      <p>Open a PDF for a pro-style reader view with thumbnails + toolbar, or open PPTX for text extraction mode.</p>
    </section>

    <section id="status" class="status hidden"></section>

    <section id="pdfReader" class="hidden">
      <div class="pdf-toolbar">
        <button id="toggleSidebar" class="icon-btn" title="Toggle thumbnails">☰</button>
        <button id="prevPage" class="icon-btn" title="Previous page">◀</button>
        <input id="pageNumber" class="page-input" type="number" min="1" value="1" />
        <span id="pageCount" class="meta">of 0</span>
        <button id="nextPage" class="icon-btn" title="Next page">▶</button>
        <button id="zoomOut" class="icon-btn" title="Zoom out">−</button>
        <button id="zoomIn" class="icon-btn" title="Zoom in">+</button>
        <select id="zoomSelect" class="input zoom-select">
          <option value="0.9">90%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="1.75">175%</option>
          <option value="2">200%</option>
        </select>
      </div>

      <div class="pdf-stage">
        <aside id="thumbPane" class="thumb-pane"></aside>
        <main class="page-pane">
          <div class="page-canvas-wrap">
            <canvas id="pageCanvas"></canvas>
          </div>
        </main>
      </div>
    </section>

    <section id="pptWorkspace" class="hidden"></section>

    <script type="module" src="viewer.js"></script>
  </body>
</html>
